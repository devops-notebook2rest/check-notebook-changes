name: Poll Notebook Repository
description: Checks if a notebook repository has new commits since the last run.
branding:
  icon: git-branch
  color: blue

inputs:
  notebook_repository_url:
    description: 'URL of the notebook repository to poll'
    required: true

outputs:
  should_run:
    description: 'True if a new commit is detected.'
    
runs:
  using: "composite"
  steps:
    - name: Checkout workflow repository
      uses: actions/checkout@v4

    - name: Prepare cache folder
      run: mkdir -p .cache
      shell: bash

    - name: Get latest commit from notebook repo
      id: get_commit
      run: |
        echo "Checking latest commit from ${{ inputs.notebook_repository_url }}"
        LATEST=$(git ls-remote ${{ inputs.notebook_repository_url }} HEAD | cut -f1)
        echo "latest_commit=$LATEST" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache last commit
      id: cache_commit
      uses: actions/cache@v4
      with:
        path: .cache/last_commit
        key: notebook-repo-${{ steps.get_commit.outputs.latest_commit }}

    - name: Decide whether to run next/downstream jobs
      id: decide
      run: |
        if [ "${{ steps.cache_commit.outputs.cache-hit }}" = "true" ]; then
          echo "should_run=false" >> $GITHUB_OUTPUT
        else
          echo "should_run=true" >> $GITHUB_OUTPUT
        fi
      shell: bash
